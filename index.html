</head>
<body>

    <header class="navbar">
        <div class="logo">UniHub</div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="login.html">Login</a>
            <a href="profile.html">Profile</a>
        </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>University Club & Event Management System</h1>
