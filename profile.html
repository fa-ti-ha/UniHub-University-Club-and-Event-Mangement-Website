<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - UniHub</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">UniHub</div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="login.html">Login</a>
            <a href="profile.html">Profile</a>
            <a href="#" id="logoutLink">Logout</a>
        </nav>
    </header>

    <section class="section auth-section">
        <div class="auth-card profile-card">
            <h1>My Profile</h1>

            <form id="profileForm">
                <div class="form-group">
                    <label for="profileName">Full Name</label>
                    <input type="text" id="profileName" required>
                </div>

                <div class="form-group">
                    <label for="profileEmail">Email</label>
                    <input type="email" id="profileEmail" disabled>
                </div>

                <div class="form-group">
                    <label for="profileRole">Role</label>
                    <input type="text" id="profileRole" disabled>
                </div>

                <div class="form-group">
                    <label for="profilePhone">Phone</label>
                    <input type="text" id="profilePhone">
                </div>

                <div class="form-group">
                    <label for="profileDepartment">Department</label>
                    <input type="text" id="profileDepartment">
                </div>

                <div class="form-group">
                    <label for="profileBio">Bio</label>
                    <textarea id="profileBio" rows="4"></textarea>
                </div>

                <button type="submit">Update Profile</button>
            </form>

            <p id="profileMessage" class="form-message"></p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 UniHub. ISD Lab Project.</p>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
